name: Build iOS Tweak (Theos)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: brew install make ldid xz

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Setup iOS SDK
        run: |
          # แก้ปัญหา Error 128 ด้วยการลบของเก่าก่อน
          rm -rf $HOME/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $HOME/theos/sdks

      - name: Build Package
        run: |
          export THEOS=$HOME/theos
          export ARCHS=arm64
          # แนะนำให้ใช้ SDK 14.0 หรือล่าสุดที่มีใน Repo
          export TARGET=iphone:clang:latest:14.0
          make package FINALPACKAGE=1

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: Tweak-DEB
          path: packages/*.deb
